<div class="alertas-wrap">
  <button class="alertas-btn" (click)="toggle()">
    <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    <span *ngIf="totalBadge > 0" class="alertas-badge">{{ totalBadge }}</span>
  </button>

  <div class="alertas-panel" *ngIf="abierta">

    <div class="alertas-seccion">
      <h4>Recordatorios pendientes</h4>
      <p *ngIf="pendientes.length === 0" class="alertas-vacio">Sin recordatorios pendientes</p>
      <div *ngFor="let r of pendientes" class="alertas-item">
        <span>{{ r.titulo_tarea }}</span>
        <div class="alertas-acciones">
          <button class="alertas-accion posponer" (click)="posponer(r.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Más tiempo
          </button>
          <button class="alertas-accion finalizar" (click)="finalizar(r.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            Terminar
          </button>
        </div>
      </div>
    </div>

    <div class="alertas-seccion">
      <div class="alertas-seccion-header">
        <h4>Notificaciones recientes</h4>
        <button *ngIf="historial.length > 0" class="alertas-limpiar"
                (click)="notifService.limpiarHistorial()">Limpiar</button>
      </div>
      <p *ngIf="historial.length === 0" class="alertas-vacio">Sin notificaciones</p>
      <div *ngFor="let n of historial" class="alertas-item">
        <span class="alertas-icon" [ngSwitch]="getIcono(n.tipo)">
          <svg *ngSwitchCase="'exito'" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          <svg *ngSwitchCase="'error'" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          <svg *ngSwitchCase="'advertencia'" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b7770d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
          <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1565c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </span>
        <span>{{ n.mensaje }}</span>
      </div>
    </div>

  </div>
</div>
