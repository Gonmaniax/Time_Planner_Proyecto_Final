<div class="login-page">
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <h1>Time Planner</h1>
      <p>Agenda digital · Gestión de tiempo</p>
    </div>

    <!-- FORMULARIO -->
    <form (ngSubmit)="iniciarSesion()">

      <div class="form-group">
        <label>Correo electrónico</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" [(ngModel)]="correo" name="email" placeholder="tu@correo.com" required />
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" [(ngModel)]="contrasena" name="password" placeholder="••••••••" required />
        </div>
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>

    <p class="link-text" style="margin-bottom: 8px;">
      <br>
      <span (click)="irARecuperar()">¿Olvidaste tu contraseña?</span>
    </p>
    <hr class="divider" />

    <p class="link-text">
      ¿No tienes cuenta?
      <span (click)="irARegistro()">Regístrate aquí</span>
    </p>

  </div>
</div>
