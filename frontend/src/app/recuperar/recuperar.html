<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7.5" cy="15.5" r="5.5"/>
          <path d="m21 2-9.6 9.6"/>
          <path d="m15.5 7.5 3 3L22 7l-3-3"/>
        </svg>
      </div>
      <h1>Recuperar contraseña</h1>
      <p *ngIf="paso === 1">Ingresa tu correo para recibir un código</p>
      <p *ngIf="paso === 2">Ingresa el código que recibiste</p>
      <p *ngIf="paso === 3">Crea tu nueva contraseña</p>
    </div>

    <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="exito-msg" *ngIf="exitoMsg">{{ exitoMsg }}</div>

    <!-- PASO 1: CORREO -->
    <form *ngIf="paso === 1 && !exitoMsg" (ngSubmit)="solicitarCodigo()">
      <div class="form-group">
        <label>Correo electrónico</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" [(ngModel)]="correo" name="correo" placeholder="tu@correo.com" required />
        </div>
      </div>
      <button type="submit" class="btn-primary" [disabled]="cargando">
        {{ cargando ? 'Enviando...' : 'Enviar código' }}
      </button>
    </form>

    <!-- PASO 2: CÓDIGO -->
    <form *ngIf="paso === 2 && !exitoMsg" (ngSubmit)="verificarCodigo()">
      <div class="form-group">
        <label>Código de 6 dígitos</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="text" [(ngModel)]="codigo" name="codigo" placeholder="123456" maxlength="6" required />
        </div>
      </div>
      <button type="submit" class="btn-primary" [disabled]="cargando">
        {{ cargando ? 'Verificando...' : 'Verificar código' }}
      </button>
    </form>

    <!-- PASO 3: NUEVA CONTRASEÑA -->
    <form *ngIf="paso === 3 && !exitoMsg" (ngSubmit)="resetearContrasena()">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" [(ngModel)]="nuevaContrasena" name="nueva" placeholder="••••••••" required />
        </div>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <div class="input-with-icon">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" [(ngModel)]="confirmarContrasena" name="confirmar" placeholder="••••••••" required />
        </div>
      </div>
      <button type="submit" class="btn-primary" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Cambiar contraseña' }}
      </button>
    </form>

    <hr class="divider" *ngIf="!exitoMsg" />

    <p class="link-text" *ngIf="!exitoMsg">
      <span (click)="volverALogin()">Volver al login</span>
    </p>

  </div>
</div>
